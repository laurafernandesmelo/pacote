<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum My Little Pony - Coleção Real</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffdff3, #e7dcff, #dff7ff);
        }

        /* FUNDO PASTEL MÁGICO */
        body::before {
            content: ""; position: absolute; border-radius: 50%; pointer-events: none; z-index: 1;
            width: 1200px; height: 1200px; 
            background: radial-gradient(circle, rgba(255,255,255,0.7), transparent 70%); 
            top: -400px; left: -400px; 
        }

        /* BOTÃO DE RESET PARA TESTES */
        .debug-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            background: #ff7b7b;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 0.8rem;
            cursor: pointer;
            z-index: 1000;
            font-weight: bold;
        }

        /* MENU DE NAVEGAÇÃO INTERNO */
        .nav-menu {
            position: relative;
            z-index: 10;
            margin-top: 20px;
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.5);
            padding: 8px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .nav-btn {
            padding: 10px 30px;
            border: none;
            background: transparent;
            color: #8a6cb5;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 40px;
            transition: 0.3s;
        }

        .nav-btn.active {
            background: #b194e8;
            color: white;
            box-shadow: 0 5px 15px rgba(177, 148, 232, 0.4);
        }

        /* CONTAINER DAS TELAS */
        .view-content {
            position: relative;
            z-index: 2;
            width: 100%;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* GERENCIAMENTO DE ABAS */
        .tab-panel {
            display: none;
            width: 100%;
            max-width: 1100px;
            height: 100%;
            animation: fadeIn 0.4s ease forwards;
        }

        .tab-panel.active-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* CAIXA DO LEMBRETE DIÁRIO */
        .chest-container {
            position: relative;
            z-index: 20;
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 35px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 45px rgba(140, 100, 200, 0.15);
            border: 4px solid white;
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 450px;
            width: 90%;
        }

        /* ESTRUTURA DO BAÚ DO TESOURO ANIMADO */
        .chest-wrapper {
            position: relative;
            width: 120px;
            height: 110px;
            margin-bottom: 20px;
            pointer-events: none;
        }

        .real-chest {
            width: 100px;
            height: 65px;
            background: #a06a42;
            border: 4px solid #5e3a1e;
            border-radius: 0 0 12px 12px;
            position: absolute;
            bottom: 0; left: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            z-index: 4;
        }

        .chest-lid {
            width: 100px;
            height: 34px;
            background: #bd8458;
            border: 4px solid #5e3a1e;
            border-radius: 20px 20px 0 0;
            position: absolute;
            top: 15px; left: 10px;
            z-index: 5;
            transform-origin: bottom center;
            transition: transform 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        .chest-lid::after {
            content: '';
            position: absolute;
            bottom: -6px; left: 38px;
            width: 16px; height: 16px;
            background: #ffd700;
            border: 2px solid #b89200;
            border-radius: 4px;
        }

        /* ANIMAÇÃO DE ABERTURA */
        .open-chest .chest-lid {
            transform: translateY(-25px) scaleY(0.3) rotateX(180deg);
        }

        .chest-title { color: #6c529c; font-size: 1.6rem; margin-bottom: 8px; }
        .chest-desc { color: #777; margin-bottom: 25px; font-size: 0.95rem; }

        /* GRUPO DE BOTÕES */
        .btn-group { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            position: relative;
            z-index: 30;
        }

        .btn-refuse {
            padding: 12px 30px;
            background: #ffb7b7;
            color: #8a4343;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-refuse:hover { transform: scale(1.05); background: #ffa1a1; }

        /* PACOTE RESTAURADO COM PROPORÇÃO CORRETA */
        .pack-wrapper {
            position: relative;
            z-index: 15;
            width: 400px; /* Largura grande ideal original */
            max-width: 90vw;
            cursor: pointer;
            user-select: none;
        }

        .popup-pack {
            animation: emergePack 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .pack-half {
            width: 100%; 
            height: auto; /* Altura automática impede que a imagem fique esticada/feia */
            display: block;
            -webkit-user-drag: none;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.15));
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .pack-top { position: relative; clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%); z-index: 12; }
        .pack-bottom { position: absolute; top: 0; left: 0; clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%); z-index: 11; }

        /* ESTÁGIOS DOS CLIQUES */
        .stage-1 .pack-half { animation: shake-light 0.3s infinite; }
        .stage-2 .pack-half { 
            animation: shake-heavy 0.2s infinite; 
            filter: brightness(1.2) drop-shadow(0 0 40px rgba(255,255,255,0.6));
        }
        .stage-3 .pack-top { transform: translateY(-110px) rotateX(25deg) rotateZ(-3deg); }
        .stage-3 .pack-bottom { transform: translateY(40px) rotateX(-20deg) rotateZ(2deg); }
        .stage-4 .pack-top { transform: translateY(-1300px) scale(0.1); opacity: 0; }
        .stage-4 .pack-bottom { transform: translateY(1300px) scale(0.1); opacity: 0; }

        /* ÁREA DAS CARTAS REVELADAS */
        .reward-screen { display: none; text-align: center; width: 100%; }
        .show-reward .reward-screen { display: block; animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .cards-container { display: flex; gap: 15px; justify-content: center; margin: 25px 0; flex-wrap: wrap; }

        /* TAG DE REPETIDA NAS FIGURINHAS */
        .card-container-wrapper { position: relative; }
        .repeat-tag {
            position: absolute; top: -8px; right: -8px; background: #ff4747; color: white;
            font-size: 0.75rem; font-weight: bold; padding: 3px 8px; border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15); z-index: 50; animation: zoomIn 0.3s ease;
        }

        .card {
            width: 140px; height: 195px; background: white; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 5px solid white;
            overflow: hidden; transition: transform 0.3s;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .reveal-card { opacity: 0; transform: translateY(40px); animation: cardAppear 0.5s forwards; }

        /* ÁLBUM */
        .album-wrapper {
            width: 100%; height: 80vh; background: rgba(255, 255, 255, 0.6);
            padding: 25px; border-radius: 25px; backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); border: 4px solid #fff;
            overflow-y: auto; text-align: center;
        }
        .album-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; margin-top: 20px; }
        .album-wrapper .card { width: 100%; height: 155px; }
        .album-wrapper .card:not(.locked) { cursor: pointer; }
        .album-wrapper .card:not(.locked):hover { transform: scale(1.08); box-shadow: 0 12px 25px rgba(177, 148, 232, 0.4); }
        .card.locked { filter: grayscale(1) brightness(0.6); opacity: 0.4; border: 4px dashed #bbb; }

        .daily-message {
            background: #fff; color: #a385e0; padding: 15px 30px; border-radius: 20px;
            font-size: 1.2rem; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); z-index: 100;
            display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content {
            background: white; padding: 20px; border-radius: 25px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3); max-width: 90%; width: 340px;
            transform: scale(0.7); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.show .modal-content { transform: scale(1); }
        .modal-card-view { width: 100%; height: 400px; border-radius: 15px; overflow: hidden; border: 8px solid #f3ecff; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .modal-card-view img { width: 100%; height: 100%; object-fit: cover; }
        .modal-title { color: #6c529c; font-size: 1.6rem; font-weight: bold; margin-bottom: 15px; }

        /* BOTÃO PRINCIPAL */
        .btn-action {
            padding: 12px 40px; background: #b194e8; color: white; border: none; border-radius: 60px;
            font-weight: bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 8px 20px rgba(177, 148, 232, 0.4); transition: 0.3s ease;
        }
        .btn-action:hover { transform: scale(1.05); background: #9b7ad9; }

        /* ANIMAÇÕES */
        @keyframes shake-light { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(2px, 2px); } }
        @keyframes shake-heavy { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(-5px, 5px); } 75% { transform: translate(5px, -5px); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.6); } to { opacity: 1; transform: scale(1); } }
        @keyframes cardAppear { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        @keyframes emergePack {
            from { transform: scale(0.1) translateY(300px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

<button class="debug-btn" onclick="resetarTeste()">Resetar Teste (Limpar Dia)</button>

<div class="nav-menu">
    <button class="nav-btn active" id="btn-tab-pacote" onclick="mudarAba('pacote')">🎁 Recompensa Diária</button>
    <button class="nav-btn" id="btn-tab-album" onclick="mudarAba('album')">📖 Meu Álbum (<span id="total-obtidas">0</span>/22)</button>
</div>

<div class="view-content" id="main-container">
    
    <div id="panel-pacote" class="tab-panel active-panel">
        
        <div id="aviso-diario" class="daily-message" style="display: none;">
            ✨ Você já abriu o pacote de hoje! Volte amanhã ou veja seu álbum. ✨
        </div>

        <!-- LEMBRETE DIÁRIO COM BAÚ -->
        <div id="tela-bau" class="chest-container">
            <div class="chest-wrapper" id="chest-box">
                <div class="chest-lid"></div>
                <div class="real-chest"></div>
            </div>
            <h2 class="chest-title">Lembrete do Dia!</h2>
            <p class="chest-desc">Seu pacote diário está disponível. Deseja coletar suas 5 figurinhas?</p>
            <div class="btn-group" id="botoes-recompensa">
                <button class="btn-action" onclick="aceitarRecompensa()">Coletar 🎁</button>
                <button class="btn-refuse" onclick="recusarRecompensa()">Recusar</button>
            </div>
        </div>

        <!-- O Pacote (Lindo, Grande e Proporcional) -->
        <div id="pacote" class="pack-wrapper" style="display: none;">
            <img src="pacote.png" class="pack-half pack-top" alt="Pacote" onerror="this.src='https://via.placeholder.com/400x500/b194e8/ffffff?text=Clique+para+Abrir!'">
            <img src="pacote.png" class="pack-half pack-bottom" alt="Pacote" onerror="this.src='https://via.placeholder.com/400x500/b194e8/ffffff?text=Clique+para+Abrir!'">
        </div>

        <!-- Tela de Cartas Ganhas -->
        <div id="reward" class="reward-screen">
            <h1 style="color: #a385e0; font-size: 2.2rem; text-shadow: 2px 2px white;">✦ NOVAS FIGURINHAS! ✦</h1>
            <div class="cards-container" id="display-cartas"></div>
            <button class="btn-action" onclick="irParaOAlbum()">Guardar e Ver Álbum</button>
        </div>
    </div>

    <div id="panel-album" class="tab-panel">
        <div class="album-wrapper">
            <h2 style="color: #6c529c; font-size: 1.8rem;">📖 Minhas Figurinhas Coletadas</h2>
            <p style="color: #888; font-size: 0.9rem; margin-bottom: 10px;">Clique em uma figurinha colorida para ampliá-la!</p>
            <div class="album-grid" id="album-grid"></div>
        </div>
    </div>

</div>

<!-- MODAL DE ZOOM -->
<div class="modal-overlay" id="carta-modal" onclick="fecharModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-card-view">
            <img id="modal-img" src="" alt="Carta Grande">
        </div>
        <div class="modal-title" id="modal-nome">Nome do Pônei</div>
        <button class="btn-action" onclick="fecharModal()">Fechar</button>
    </div>
</div>

<script>
    const todasAsCartas = [
        { id: 1, nome: "Princesa Luna", img: "princesaluna.jpeg" },
        { id: 2, nome: "Princesa Cadence", img: "princesacadence.jpeg" },
        { id: 3, nome: "Applejack", img: "applejack.jpeg" },
        { id: 4, nome: "Pinkie Pie", img: "pinkiepie.jpeg" },
        { id: 5, nome: "Rarity", img: "rarity.jpeg" },
        { id: 6, nome: "Fluttershy", img: "fluttershy.jpeg" },
        { id: 7, nome: "Twilight", img: "twilight.jpeg" },
        { id: 8, nome: "Rainbow Dash", img: "rainbowdash.jpeg" },
        { id: 9, nome: "Apple", img: "apple.png" },
        { id: 10, nome: "Sparkle", img: "sparkle.jpg" },
        { id: 11, nome: "Princess", img: "princess.jpg" },
        { id: 12, nome: "Lu", img: "lu.jpg" },
        { id: 13, nome: "Cada", img: "cada.jpg" },
        { id: 14, nome: "Pie", img: "pie.jpg" },
        { id: 15, nome: "Rar", img: "rar.jpg" },
        { id: 16, nome: "Rain", img: "rain.jpg" },
        { id: 17, nome: "Baby Flurry", img: "babyflur.jpeg" },
        { id: 18, nome: "Rarity Baby", img: "raritybaby.jpg" },
        { id: 19, nome: "Pinkie Baby", img: "pinkiebaby.jpg" },
        { id: 20, nome: "Apple Baby", img: "applebaby.jpg" },
        { id: 21, nome: "Rain Baby", img: "rainbaby.jpg" },
        { id: 22, nome: "Twi Baby", img: "twibaby.jpg" }
    ];

    const container = document.getElementById('main-container');
    const pacote = document.getElementById('pacote');
    const displayCartas = document.getElementById('display-cartas');
    const albumGrid = document.getElementById('album-grid');
    const avisoDiario = document.getElementById('aviso-diario');
    const telaBau = document.getElementById('tela-bau');
    const chestBox = document.getElementById('chest-box');
    
    const modal = document.getElementById('carta-modal');
    const modalImg = document.getElementById('modal-img');
    const modalNome = document.getElementById('modal-nome');
    
    let cliques = 0;
    let colecaoUsuario = JSON.parse(localStorage.getItem('mlp_colecao')) || [];

    function jaAbriuHoje() {
        const hoje = new Date().toDateString();
        return hoje === localStorage.getItem('mlp_ultimo_pacote');
    }

    function inicializar() {
        renderizarAlbum();
        if (jaAbriuHoje()) {
            telaBau.style.display = 'none';
            pacote.style.display = 'none';
            avisoDiario.style.display = 'inline-block';
        } else {
            telaBau.style.display = 'flex';
            avisoDiario.style.display = 'none';
        }
    }

    function mudarAba(aba) {
        document.getElementById('btn-tab-pacote').classList.remove('active');
        document.getElementById('btn-tab-album').classList.remove('active');
        document.getElementById('panel-pacote').classList.remove('active-panel');
        document.getElementById('panel-album').classList.remove('active-panel');

        if(aba === 'pacote') {
            document.getElementById('btn-tab-pacote').classList.add('active');
            document.getElementById('panel-pacote').classList.add('active-panel');
        } else {
            document.getElementById('btn-tab-album').classList.add('active');
            document.getElementById('panel-album').classList.add('active-panel');
        }
    }

    function aceitarRecompensa() {
        chestBox.classList.add('open-chest');
        document.getElementById('botoes-recompensa').style.pointerEvents = 'none';

        setTimeout(() => {
            telaBau.style.display = 'none'; 
            pacote.style.display = 'block'; 
            pacote.classList.add('popup-pack'); 
        }, 600);
    }

    function recusarRecompensa() {
        mudarAba('album');
    }

    function resetarTeste() {
        localStorage.removeItem('mlp_ultimo_pacote');
        cliques = 0;
        container.classList.remove('stage-1', 'stage-2', 'stage-3', 'stage-4', 'show-reward');
        chestBox.classList.remove('open-chest');
        document.getElementById('botoes-recompensa').style.pointerEvents = 'auto';
        document.getElementById('botoes-recompensa').style.visibility = 'visible';
        inicializar();
        mudarAba('pacote');
        alert("Pronto! Sistema reiniciado para novos testes.");
    }

    function renderizarAlbum() {
        albumGrid.innerHTML = '';
        let obtidas = 0;

        todasAsCartas.forEach(carta => {
            const possui = colecaoUsuario.includes(carta.id);
            if (possui) obtidas++;

            const div = document.createElement('div');
            div.className = `card ${possui ? '' : 'locked'}`;
            div.innerHTML = `<img src="${carta.img}" onerror="this.src='https://via.placeholder.com/110x155?text=?';">`;
            
            if (possui) {
                div.addEventListener('click', () => abrirModal(carta));
            }

            albumGrid.appendChild(div);
        });

        document.getElementById('total-obtidas').innerText = obtidas;
    }

    function abrirModal(carta) {
        modalImg.src = carta.img;
        modalNome.innerText = carta.nome;
        modal.classList.add('show');
    }

    function fecharModal() {
        modal.classList.remove('show');
    }

    /* CLIQUES NO PACOTE CORRIGIDO */
    pacote.addEventListener('click', () => {
        if (cliques >= 4) return;
        
        cliques++;
        container.classList.remove('stage-1', 'stage-2', 'stage-3', 'stage-4');

        if (cliques === 1) container.classList.add('stage-1');
        else if (cliques === 2) container.classList.add('stage-2');
        else if (cliques === 3) container.classList.add('stage-3');
        else if (cliques === 4) {
            container.classList.add('stage-4');

            displayCartas.innerHTML = '';
            
            // Sorteio com repetidas ativado
            for (let i = 0; i < 5; i++) {
                const indiceAleatorio = Math.floor(Math.random() * todasAsCartas.length);
                const carta = todasAsCartas[indiceAleatorio];
                const jaTinha = colecaoUsuario.includes(carta.id);

                if (!jaTinha) {
                    colecaoUsuario.push(carta.id);
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'card-container-wrapper';

                if (jaTinha) {
                    const tag = document.createElement('span');
                    tag.className = 'repeat-tag';
                    tag.innerText = 'Repetida';
                    wrapper.appendChild(tag);
                }

                const divCard = document.createElement('div');
                divCard.className = 'card reveal-card';
                divCard.style.animationDelay = (i * 0.2) + "s";
                divCard.innerHTML = `<img src="${carta.img}" onerror="this.src='https://via.placeholder.com/140x195?text=Pony'">`;
                
                wrapper.appendChild(divCard);
                displayCartas.appendChild(wrapper);
            }

            localStorage.setItem('mlp_colecao', JSON.stringify(colecaoUsuario));
            localStorage.setItem('mlp_ultimo_pacote', new Date().toDateString());

            setTimeout(() => {
                pacote.style.display = 'none';
                container.classList.add('show-reward');
                renderizarAlbum(); 
            }, 800);
        }
    });

    function irParaOAlbum() {
        container.classList.remove('show-reward');
        avisoDiario.style.display = 'inline-block';
        mudarAba('album');
    }

    inicializar();
</script>

</body>
</html>
