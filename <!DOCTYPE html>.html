<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abertura Épica - 4 Cliques</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffdff3, #e7dcff, #dff7ff);
        }

        /* FUNDO PASTEL COM EFEITO DE LUZ */
        body::before {
            content: "";
            position: absolute;
            width: 1200px;
            height: 1200px;
            background: radial-gradient(circle, rgba(255,255,255,0.7), transparent 70%);
            top: -400px;
            left: -400px;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: absolute;
            width: 1000px;
            height: 1000px;
            background: radial-gradient(circle, rgba(255,255,255,0.6), transparent 70%);
            bottom: -400px;
            right: -400px;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            perspective: 2500px;
            text-align: center;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* PACOTE GIGANTE */
        .pack-wrapper {
            position: relative;
            width: 850px; 
            max-width: 95vw;
            cursor: pointer;
            user-select: none;
            transition: transform 0.4s ease;
        }

        .pack-half {
            width: 100%;
            height: auto;
            display: block;
            -webkit-user-drag: none;
            filter: drop-shadow(0 30px 60px rgba(0,0,0,0.12));
            transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .pack-top {
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            z-index: 2;
        }

        .pack-bottom {
            position: absolute;
            top: 0;
            left: 0;
            clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
            z-index: 1;
        }

        /* --- ESTADOS DOS 4 CLIQUES --- */

        /* 1º Clique: Tremor Leve */
        .stage-1 .pack-half {
            animation: shake-light 0.3s infinite;
        }

        /* 2º Clique: Tremor Forte + Brilho */
        .stage-2 .pack-half {
            animation: shake-heavy 0.2s infinite;
            filter: brightness(1.2) drop-shadow(0 0 30px rgba(255, 255, 255, 0.8));
        }

        /* 3º Clique: O pacote racha/abre um pouco */
        .stage-3 .pack-top {
            transform: translateY(-90px) rotateX(20deg) rotateZ(-2deg);
        }
        .stage-3 .pack-bottom {
            transform: translateY(30px) rotateX(-15deg) rotateZ(1deg);
        }
        .stage-3 .pack-half {
            filter: brightness(1.3) drop-shadow(0 0 50px white);
        }

        /* 4º Clique: Explosão Final */
        .stage-4 .pack-top {
            transform: translateY(-1200px) rotateZ(-45deg) scale(0.2);
            opacity: 0;
        }
        .stage-4 .pack-bottom {
            transform: translateY(1200px) rotateZ(45deg) scale(0.2);
            opacity: 0;
        }

        /* TELA DE SUCESSO */
        .reward-screen {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .show-reward .reward-screen {
            display: block;
            transform: translate(-50%, -50%) scale(1.3);
            opacity: 1;
        }

        /* ANIMAÇÕES */
        @keyframes shake-light {
            0% { transform: translate(0,0); }
            50% { transform: translate(2px, 2px) rotate(0.3deg); }
            100% { transform: translate(0,0); }
        }

        @keyframes shake-heavy {
            0% { transform: translate(0,0); }
            25% { transform: translate(-5px, 4px) rotate(-1deg); }
            75% { transform: translate(5px, -4px) rotate(1deg); }
            100% { transform: translate(0,0); }
        }

        .btn-restart {
            margin-top: 50px;
            padding: 20px 60px;
            background: white;
            border-radius: 60px;
            color: #b194e8;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            box-shadow: 0 15px 40px rgba(177, 148, 232, 0.3);
        }

        .hidden { display: none; }

    </style>
</head>
<body>

<div class="container" id="main-container">
    
    <div id="pacote" class="pack-wrapper">
        <img src="pacote.png" class="pack-half pack-top" alt="Pacote Topo">
        <img src="pacote.png" class="pack-half pack-bottom" alt="Pacote Baixo">
    </div>

    <div id="reward" class="reward-screen">
        <h1 style="color: #a385e0; font-size: 4rem; text-shadow: 3px 3px 0 white;">✦ ÉPICO! ✦</h1>
        <p style="color: #888; font-size: 1.5rem;">O segredo do pacote foi revelado!</p>
        <button class="btn-restart" onclick="location.reload()">Abrir outro</button>
    </div>

</div>

<script>
    const container = document.getElementById('main-container');
    const pacote = document.getElementById('pacote');
    let cliques = 0;

    pacote.addEventListener('click', () => {
        cliques++;

        // Remove classes anteriores
        container.classList.remove('stage-1', 'stage-2', 'stage-3', 'stage-4');

        if (cliques === 1) {
            container.classList.add('stage-1');
        } 
        else if (cliques === 2) {
            container.classList.add('stage-2');
        } 
        else if (cliques === 3) {
            container.classList.add('stage-3');
        } 
        else if (cliques === 4) {
            container.classList.add('stage-4');

            setTimeout(() => {
                pacote.classList.add('hidden');
                container.classList.add('show-reward');
            }, 700);
        }
    });
</script>

</body>
</html>
